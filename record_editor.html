<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/x-icon" href="imgs/keyboard.ico">
        <link rel="stylesheet" href="styles.css">
        <title>DEX: Record Editor</title>
    </head>
    <body>

        <h1>Record Editor</h1>

        <form id="recordForm"></form>
        <button type="button" id="downloadFileBtn">Download File</button>

        <!-- Key Section -->

        <div id="key">
            <div id="NM">
                <h3>Normal Mode</h3>
                <p>j = Next Field</p>
                <p>k = Previous Field</p>
                <p>dd = Delete Field</p>
                <p>cw = Change Field</p>
                <p>i = Enters Insert Mode</p>
            </div>

            <div id="IM">
                <h3>Insert Mode</h3>
                <p>ENTER = Next Field</p>
                <p>ESC = Exit Mode</p>
                <br>
                <br>
                <br>
                <br>
                <!-- Will be incorporated in the future -->
                <!-- <p>F10 = Submit Record</p> -->
            </div>
        </div>

        <div id="status-bar">
            <h1 id="status-bar-output"></h1>
        </div>

        <!-- Script -->
        <script type="module" src="js/record_editor.js"></script>
    </body>
</html>

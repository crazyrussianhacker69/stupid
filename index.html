<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <link rel="icon" type="image/x-icon" href="imgs/favicon.ico">
        <link rel="stylesheet" href="styles.css">
        <title>DEX: Login</title>
    </head>

    <body id="indexBody">
        <div id="loginContainer">
            <h1 id="smallLogo">DEX</h1>
            <p id="motto">--Data Entry Xpress--</p>
            <h2 id="loginLabel">Login</h2>

            <!--made two different ID's for the username and password fields-->
            <div class="operatorInfoContainer">
                <p class="operatorIDLabel">Username</p>
                <input type="text" name="opID" id="usernameInputBox" placeholder="Username">
                
            </div>

            <div class="operatorInfoContainer">
                <p class="operatorIDLabel">Password</p>
                <input type="password" name="opID" id="passwordInputBox" placeholder="Password">
                 <button id="loginBtn" type="button">Login</button>
            </div>

            

            <h6 id="systemVersionLabel">v0.0.1</h6>
        </div>

        <!-- Script -->
        <script type="module" src="js/index.js"></script>
    </body>
</html>

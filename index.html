<!DOCTYPE html>
<html>

        <link rel="stylesheet" href="styles.css">
        <title>DEX: Login</title>

        <div id="loginContainer">
            <h1 id="smallLogo">DEX</h1>

            <h6 id="systemVersionLabel">v0.0.1</h6>
        </div>

        <!-- Script -->
        <script type="module" src="js/index.js"></script>
